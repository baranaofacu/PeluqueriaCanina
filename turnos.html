<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelitos Felices - Turnos</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/estilos-turnos.css" />
    <link rel="icon" type="image/png" href="img/logoPag.png" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo-container">
        <img
          src="img/BannerPag.png"
          alt="Logo Pelitos Felices"
          class="logo-main"
        />
      </a>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="servicios.html">Servicios</a></li>
          <li><a href="reservas.html">Reservas</a></li>
          <li><a href="turnos.html">Turnos</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-turnos">
      <section class="turnos-section">
        <h2>Sacar un turno</h2>

        <form id="form-turno" novalidate>
          <div class="campo">
            <label for="duenio"
              >Nombre del dueño <span class="req">*</span></label
            >
            <input type="text" id="duenio" placeholder="Ej: Juan Pérez" />
            <p class="error-msg" id="err-duenio"></p>
          </div>

          <div class="campo">
            <label for="mascota"
              >Nombre de la mascota <span class="req">*</span></label
            >
            <input type="text" id="mascota" placeholder="Ej: Firulais" />
            <p class="error-msg" id="err-mascota"></p>
          </div>

          <div class="campo">
            <label for="servicio">Servicio <span class="req">*</span></label>
            <select id="servicio">
              <option value="">-- Seleccioná un servicio --</option>
              <option value="baño">Baño</option>
              <option value="corte">Corte de pelo</option>
              <option value="spa">Spa</option>
              <option value="baño-corte">Baño + Corte</option>
              <option value="desparasitacion">Desparasitación</option>
              <option value="uñas">Corte de uñas</option>
            </select>
            <p class="error-msg" id="err-servicio"></p>
          </div>

          <div class="campo">
            <label for="fecha">Fecha <span class="req">*</span></label>
            <input type="date" id="fecha" />
            <p class="error-msg" id="err-fecha"></p>
          </div>

          <div class="campo">
            <label for="hora">Hora <span class="req">*</span></label>
            <input type="time" id="hora" />
            <p class="error-msg" id="err-hora"></p>
          </div>

          <button type="submit" class="btn-turno">Confirmar turno</button>
        </form>

        <div class="confirmacion" id="confirmacion"></div>
      </section>
    </main>

    <footer>
      <p>
        &copy; Barañao Benjamin Facundo. Presentar hasta el miercoles 13/05/26;
        12:30hs.
      </p>
    </footer>
    <script src="js/funciones-turnos.js"></script>
  </body>
</html>
